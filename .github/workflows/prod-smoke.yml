name: Prod Smoke (password reset)

# Manually triggered, production-approved smoke test for the password-reset
# release (#159). This is the ONLY workflow permitted to mutate a live
# deployment. It never runs on push/PR.
#
# Safety model:
#   - Requires manual dispatch.
#   - Pinned to the `production` GitHub Environment, so a required reviewer must
#     approve each run (configure the environment's protection rules).
#   - The suite itself fails closed unless PROD_SMOKE=1, ALLOW_PROD_MUTATIONS=true,
#     and the base URL host matches PROD_SMOKE_EXPECTED_HOST (see smoke.helpers.ts).

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Production base URL (e.g. https://app.example.com)"
        required: true
        type: string
      reset_link:
        description: "Optional: paste the reset link from the smoke inbox to run the full token-dependent canaries"
        required: false
        type: string
      confirm:
        description: "Type PRODUCTION to confirm you intend to mutate the live environment"
        required: true
        type: string

permissions: {}

jobs:
  prod-smoke:
    name: Prod Smoke
    runs-on: ubuntu-latest
    # Requires approval via the environment's protection rules before running.
    environment: production
    permissions:
      contents: read
    env:
      PROD_SMOKE: "1"
      ALLOW_PROD_MUTATIONS: "true"
      PROD_SMOKE_BASE_URL: ${{ inputs.base_url }}
      PROD_SMOKE_RUN_ID: ${{ github.run_id }}
      SMOKE_RESET_LINK: ${{ inputs.reset_link }}
      # Host lock + credentials live in the `production` environment secrets.
      # Only the values the automated canaries actually consume are wired in;
      # the dual-auth account is used by hand in the manual checkpoint, so its
      # credentials are deliberately NOT exported here.
      PROD_SMOKE_EXPECTED_HOST: ${{ secrets.PROD_SMOKE_EXPECTED_HOST }}
      SMOKE_PASSWORD_EMAIL: ${{ secrets.SMOKE_PASSWORD_EMAIL }}
      SMOKE_PASSWORD_CURRENT: ${{ secrets.SMOKE_PASSWORD_CURRENT }}
      SMOKE_PASSWORD_NEW: ${{ secrets.SMOKE_PASSWORD_NEW }}
      SMOKE_GOOGLE_EMAIL: ${{ secrets.SMOKE_GOOGLE_EMAIL }}
    steps:
      - name: Guard — confirmation phrase
        if: ${{ inputs.confirm != 'PRODUCTION' }}
        run: |
          echo "::error::Refusing to run: confirmation phrase was not 'PRODUCTION'."
          exit 1

      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run production smoke canaries
        run: npx playwright test --project=prod-smoke

      - name: Upload report + traces
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: prod-smoke-report-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14
